name: Slack Notify (Central)

on:
  workflow_call:
    inputs:
      repo_name:
        required: true
        type: string
      branch_name:
        required: true
        type: string
      commit_msg:
        required: true
        type: string
      committer:
        required: true
        type: string
      commit_url:
        required: true
        type: string
      sha:
        required: true
        type: string
      event_type:
        required: true
        type: string
      pr_number:
        required: false
        type: string
        default: ""
      pr_title:
        required: false
        type: string
        default: ""
    secrets:
      SLACK_WEBHOOK:
        required: true

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
        with:
          fetch-depth: 2

      - name: Get Changed Files
        id: files
        run: |
          FILES=$(git diff-tree --no-commit-id --name-only -r ${{ inputs.sha }} 2>/dev/null || echo "")
          TOTAL=0
          FILE_LIST=""
          COUNT=0
          ALL_FILES=""
          while IFS= read -r file; do
            [ -z "$file" ] && continue
            TOTAL=$((TOTAL + 1))
            ALL_FILES="${ALL_FILES}• ${file}\n"
            if [ $COUNT -lt 5 ]; then
              FILE_URL="https://github.com/${{ inputs.repo_name }}/blob/${{ inputs.branch_name }}/${file}"
              FILE_LIST="${FILE_LIST}• <${FILE_URL}|${file}>\n"
              COUNT=$((COUNT + 1))
            fi
          done <<< "$FILES"
          if [ $TOTAL -gt 5 ]; then
            REMAINING=$((TOTAL - 5))
            FILE_LIST="${FILE_LIST}… <${{ inputs.commit_url }}|View ${REMAINING} more>"
          fi
          # Use base64 to avoid escaping issues
          echo "list=$(echo -n "$FILE_LIST" | base64 -w0)" >> $GITHUB_OUTPUT
          echo "count=$TOTAL" >> $GITHUB_OUTPUT
          echo "all=$(echo -n "$ALL_FILES" | base64 -w0)" >> $GITHUB_OUTPUT

      - name: Send to Slack
        run: |
          WEBHOOK="${{ secrets.SLACK_WEBHOOK }}"
          TYPE="${{ inputs.event_type }}"
          
          # Decode file lists
          FLIST=$(echo "${{ steps.files.outputs.list }}" | base64 -d)
          AFILES=$(echo "${{ steps.files.outputs.all }}" | base64 -d)
          FCOUNT="${{ steps.files.outputs.count }}"
          
          if [ "$TYPE" = "push" ]; then
            curl -s -X POST -H "Content-type: application/json" -d @- "$WEBHOOK" <<PAYLOAD
          {
            "blocks": [
              {
                "type": "section",
                "text": {
                  "type": "mrkdwn",
                  "text": "*🟢 New Commit Pushed*"
                }
              },
              {
                "type": "divider"
              },
              {
                "type": "section",
                "fields": [
                  {
                    "type": "mrkdwn",
                    "text": "*Repository:*\n<https://github.com/${{ inputs.repo_name }}|${{ inputs.repo_name }}>"
                  },
                  {
                    "type": "mrkdwn",
                    "text": "*Branch:*\n`${{ inputs.branch_name }}`"
                  }
                ]
              },
              {
                "type": "section",
                "text": {
                  "type": "mrkdwn",
                  "text": "*Author:*\n👤 ${{ inputs.committer }}"
                }
              },
              {
                "type": "section",
                "text": {
                  "type": "mrkdwn",
                  "text": "*Commit Message:*\n📝 ${{ inputs.commit_msg }}"
                }
              },
              {
                "type": "divider"
              },
              {
                "type": "context",
                "elements": [
                  {
                    "type": "mrkdwn",
                    "text": "📄 Files:\n${FLIST}"
                  }
                ]
              }
            ]
          }
          PAYLOAD
          else
            curl -s -X POST -H "Content-type: application/json" -d @- "$WEBHOOK" <<PAYLOAD
          {
           
