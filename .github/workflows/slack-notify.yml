name: Slack Notify (Central)

on:
  workflow_call:
    inputs:
      repo_name:
        required: true
        type: string
      branch_name:
        required: true
        type: string
      commit_msg:
        required: true
        type: string
      committer:
        required: true
        type: string
      commit_url:
        required: true
        type: string
      sha:
        required: true
        type: string
    secrets:
      SLACK_WEBHOOK:
        required: true

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
        with:
          fetch-depth: 2

      - name: Send to Slack
        run: |
          curl -s -X POST \
            -H "Content-type: application/json" \
            -d "{\"text\":\"🟢 Commit in ${{ inputs.repo_name }} by ${{ inputs.committer }}: ${{ inputs.commit_msg }}\"}" \
            "${{ secrets.SLACK_WEBHOOK }}"
          
          echo "✅ Done!"
