name: Slack Notify (Central)

on:
  workflow_call:
    inputs:
      repo_name:
        required: true
        type: string
      branch_name:
        required: true
        type: string
      commit_msg:
        required: true
        type: string
      committer:
        required: true
        type: string
      commit_url:
        required: true
        type: string
      sha:
        required: true
        type: string
      event_type:
        required: true
        type: string
      pr_number:
        required: false
        type: string
        default: ""
      pr_title:
        required: false
        type: string
        default: ""
    secrets:
      SLACK_WEBHOOK:
        required: true

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
        with:
          fetch-depth: 2

      - name: Get Changed Files
        id: files
        run: |
          if [ "${{ inputs.event_type }}" = "push" ]; then
            FILES=$(git diff-tree --no-commit-id --name-only -r ${{ inputs.sha }} 2>/dev/null || echo "")
          else
            FILES=""
          fi
          
          TOTAL=0
          FILE_LIST=""
          COUNT=0
          
          while IFS= read -r file; do
            [ -z "$file" ] && continue
            TOTAL=$((TOTAL + 1))
            if [ $COUNT -lt 5 ]; then
              FILE_URL="https://github.com/${{ inputs.repo_name }}/blob/${{ inputs.branch_name }}/${file}"
              FILE_LIST="${FILE_LIST}• <${FILE_URL}|${file}>\\n"
              COUNT=$((COUNT + 1))
            fi
          done <<< "$FILES"
          
          if [ $TOTAL -gt 5 ]; then
            REMAINING=$((TOTAL - 5))
            FILE_LIST="${FILE_LIST}… <${{ inputs.commit_url }}|View ${REMAINING} more>"
          fi
          
          echo "list=${FILE_LIST}" >> $GITHUB_OUTPUT
          echo "count=${TOTAL}" >> $GITHUB_OUTPUT

      - name: Escape Text
        id: escape
        run: |
          MSG="${{ inputs.commit_msg }}"
          MSG="${MSG//\"/\\\"}"
          MSG="${MSG//$'\n'/ }"
          echo "msg=${MSG}" >> $GITHUB_OUTPUT
          
          SHORT_MSG="${MSG:0:80}"
          if [ ${#MSG} -gt 80 ]; then
            SHORT_MSG="${SHORT_MSG}…"
          fi
          echo "short=${SHORT_MSG}" >> $GITHUB_OUTPUT

      - name: Send Main Message
        id: slack
        run: |
          WEBHOOK="${{ secrets.SLACK_WEBHOOK }}"
          
          if [ "${{ inputs.event_type }}" = "push" ]; then
            PAYLOAD="{
              \"blocks\": [
                {
                  \"type\": \"header\",
                  \"text\": { \"type\": \"plain_text\", \"text\": \"🟢 New Commit Pushed\", \"emoji\": true }
                },
                {
                  \"type\": \"section\",
                  \"fields\": [
                    { \"type\": \"mrkdwn\", \"text\": \"*Repo:*\\n<https://github.com/${{ inputs.repo_name }}|${{ inputs.repo_name }}>\" },
                    { \"type\": \"mrkdwn\", \"text\": \"*Branch:*\\n\`${{ inputs.branch_name }}\`\" }
                  ]
                },
                {
                  \"type\": \"section\",
                  \"text\": {
                    \"type\": \"mrkdwn\",
                    \"text\": \"👤 *${{ inputs.committer }}* pushed\\n📝 _${{ steps.escape.outputs.short }}_\"
                  }
                },
                {
                  \"type\": \"context\",
                  \"elements\": [
                    { \"type\": \"mrkdwn\", \"text\": \"📄 ${{ steps.files.outputs.list }}\" }
                  ]
                }
              ]
            }"
          else
            PAYLOAD="{
              \"blocks\": [
                {
                  \"type\": \"header\",
                  \"text\": { \"type\": \"plain_text\", \"text\": \"🔀 PR Merged\", \"emoji\": true }
                },
                {
                  \"type\": \"section\",
                  \"text\": {
                    \"type\": \"mrkdwn\",
                    \"text\": \"*<${{ inputs.commit_url }}|#${{ inputs.pr_number }} ${{ inputs.pr_title }}>*\\n👤 Merged by *${{ inputs.committer }}* into \`${{ inputs.branch_name }}\`\\n✅ Checks passed • 📄 ${{ steps.files.outputs.count }} files changed\"
                  }
                }
              ]
            }"
          fi
          
          RESPONSE=$(curl -s -X POST -H "Content-type: application/json" -d "$PAYLOAD" "$WEBHOOK")
          echo "response=$RESPONSE" >> $GITHUB_OUTPUT
          
          THREAD_TS=$(echo "$RESPONSE" | sed -n 's/.*"ts":"\([^"]*\)".*/\1/p' | head -1)
          echo "ts=$THREAD_TS" >> $GITHUB_OUTPUT

      - name: Send Thread (If Needed)
        if: ${{ inputs.event_type == 'push' && steps.files.outputs.count > 5 }}
        run: |
          WEBHOOK="${{ secrets.SLACK_WEBHOOK }}"
          THREAD_TS="${{ steps.slack.outputs.ts }}"
          
          ALL_FILES=$(git diff-tree --no-commit-id --name-only -r ${{ inputs.sha }} 2>/dev/null | sed 's/^/• /' | tr '\n' '\\n')
          
          curl -s -X POST -H "Content-type: application/json" \
            -d "{
              \"thread_ts\": \"$THREAD_TS\",
              \"text\": \"🧵 *Full Commit Details*\\n\\n*Message:*\\n${{ steps.escape.outputs.msg }}\\n\\n*All Files Changed:*\\n$ALL_FILES\"
            }" "$WEBHOOK"
