name: Slack Notify (Central)

on:
  workflow_call:
    inputs:
      repo_name:
        required: true
        type: string
      branch_name:
        required: true
        type: string
      commit_msg:
        required: true
        type: string
      committer:
        required: true
        type: string
      commit_url:
        required: true
        type: string
      sha:
        required: true
        type: string
      event_type:
        required: true
        type: string
      pr_number:
        required: false
        type: string
        default: ""
      pr_title:
        required: false
        type: string
        default: ""
    secrets:
      SLACK_WEBHOOK:
        required: true

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
        with:
          fetch-depth: 2

      - name: Get Changed Files
        id: files
        run: |
          FILES=$(git diff-tree --no-commit-id --name-only -r ${{ inputs.sha }} 2>/dev/null || echo "")
          TOTAL=0
          FILE_LIST=""
          COUNT=0
          ALL_FILES=""
          while IFS= read -r file; do
            [ -z "$file" ] && continue
            TOTAL=$((TOTAL + 1))
            ALL_FILES="${ALL_FILES}• ${file}\n"
            if [ $COUNT -lt 5 ]; then
              FILE_URL="https://github.com/${{ inputs.repo_name }}/blob/${{ inputs.branch_name }}/${file}"
              FILE_LIST="${FILE_LIST}• <${FILE_URL}|${file}>\n"
              COUNT=$((COUNT + 1))
            fi
          done <<< "$FILES"
          if [ $TOTAL -gt 5 ]; then
            REMAINING=$((TOTAL - 5))
            FILE_LIST="${FILE_LIST}… <${{ inputs.commit_url }}|View ${REMAINING} more>"
          fi
          echo "list=$(echo -n "$FILE_LIST" | base64 -w0)" >> $GITHUB_OUTPUT
          echo "count=$TOTAL" >> $GITHUB_OUTPUT
          echo "all=$(echo -n "$ALL_FILES" | base64 -w0)" >> $GITHUB_OUTPUT

      - name: Send to Slack
        id: slack
        run: |
          WEBHOOK="${{ secrets.SLACK_WEBHOOK }}"
          TYPE="${{ inputs.event_type }}"
          FLIST=$(echo "${{ steps.files.outputs.list }}" | base64 -d 2>/dev/null || echo "")
          FCOUNT="${{ steps.files.outputs.count }}"
          REPO="${{ inputs.repo_name }}"
          BRANCH="${{ inputs.branch_name }}"
          USER="${{ inputs.committer }}"
          MSG="${{ inputs.commit_msg }}"
          URL="${{ inputs.commit_url }}"
          PRNUM="${{ inputs.pr_number }}"
          PRTITLE="${{ inputs.pr_title }}"
          MSG="${MSG//\\/\\\\}"
          MSG="${MSG//\"/\\\"}"
          MSG="${MSG//$'\n'/ }"
          PRTITLE="${PRTITLE//\\/\\\\}"
          PRTITLE="${PRTITLE//\"/\\\"}"
          
          if [ "$TYPE" = "push" ]; then
            RESPONSE=$(curl -s -X POST -H "Content-type: application/json" \
              -d "{\"blocks\":[{\"type\":\"section\",\"text\":{\"type\":\"mrkdwn\",\"text\":\"*🟢 New Commit Pushed*\"}},{\"type\":\"divider\"},{\"type\":\"section\",\"fields\":[{\"type\":\"mrkdwn\",\"text\":\"*Repository:*\\n<https://github.com/${REPO}|${REPO}>\"},{\"type\":\"mrkdwn\",\"text\":\"*Branch:*\\n\`${BRANCH}\`\"}]},{\"type\":\"section\",\"text\":{\"type\":\"mrkdwn\",\"text\":\"*Author:*\\n👤 ${USER}\"}},{\"type\":\"section\",\"text\":{\"type\":\"mrkdwn\",\"text\":\"*Commit Message:*\\n📝 ${MSG}\"}},{\"type\":\"divider\"},{\"type\":\"context\",\"elements\":[{\"type\":\"mrkdwn\",\"text\":\"📄 Files:\\n${FLIST}\"}]}]}" \
              "$WEBHOOK")
          else
            RESPONSE=$(curl -s -X POST -H "Content-type: application/json" \
              -d "{\"blocks\":[{\"type\":\"section\",\"text\":{\"type\":\"mrkdwn\",\"text\":\"*🔀 PR Merged*\\n\\n*<${URL}|#${PRNUM} ${PRTITLE}>*\\n\\n👤 Merged by *${USER}* into \`${BRANCH}\`\\n\\n✅ Checks passed • 📄 ${FCOUNT:-0} files changed\"}]}]}" \
              "$WEBHOOK")
          fi
          
          # Extract timestamp from response
          TS=$(echo "$RESPONSE" | grep -o '"ts":"[^"]*"' | head -1 | cut -d'"' -f4)
          echo "ts=$TS" >> $GITHUB_OUTPUT

      - name: Send Thread (If Many Files)
        if: ${{ inputs.event_type == 'push' && steps.files.outputs.count > 5 }}
        run: |
          WEBHOOK="${{ secrets.SLACK_WEBHOOK }}"
          AFILES=$(echo "${{ steps.files.outputs.all }}" | base64 -d)
          TS="${{ steps.slack.outputs.ts }}"
          curl -s -X POST -H "Content-type: application/json" \
            -d "{\"thread_ts\":\"$TS\",\"text\":\"🧵 *All Files Changed:*\\n${AFILES}\"}" \
            "$WEBHOOK"
